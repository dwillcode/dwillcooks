<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="dwillcooks - Coming Soon! Sign up to be notified when we launch.">
    <title>dwillcooks - Coming Soon</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #333;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 60px 40px;
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        .logo {
            font-size: 48px;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 32px;
            color: #2d3748;
            margin-bottom: 15px;
        }

        .subtitle {
            font-size: 18px;
            color: #718096;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .email-form {
            margin-bottom: 30px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 20px;
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
        }

        input[type="email"] {
            flex: 1;
            padding: 16px 20px;
            font-size: 16px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="email"]:focus {
            border-color: #667eea;
        }

        input[type="email"]::placeholder {
            color: #a0aec0;
        }

        button {
            padding: 16px 32px;
            font-size: 16px;
            font-weight: 600;
            color: white;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .message {
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.success {
            background-color: #c6f6d5;
            color: #22543d;
            border: 2px solid #9ae6b4;
        }

        .message.error {
            background-color: #fed7d7;
            color: #742a2a;
            border: 2px solid #fc8181;
        }

        .message.show {
            display: block;
        }

        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 40px;
            text-align: left;
        }

        .feature {
            padding: 20px;
            background: #f7fafc;
            border-radius: 10px;
        }

        .feature-icon {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .feature-title {
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 5px;
        }

        .feature-text {
            font-size: 14px;
            color: #718096;
        }

        @media (max-width: 600px) {
            .container {
                padding: 40px 30px;
            }

            .logo {
                font-size: 36px;
            }

            h1 {
                font-size: 24px;
            }

            .subtitle {
                font-size: 16px;
            }

            .input-wrapper {
                flex-direction: column;
            }

            button {
                width: 100%;
            }

            .features {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🍳 dwillcooks</div>
        <h1>Something Delicious is Cooking!</h1>
        <p class="subtitle">
            We're preparing something special for food lovers. Sign up to be the first to know when we launch!
        </p>

        <form class="email-form" id="emailForm">
            <div class="form-group">
                <div class="input-wrapper">
                    <input 
                        type="email" 
                        id="emailInput" 
                        placeholder="Enter your email address" 
                        required
                        aria-label="Email address"
                    >
                    <button type="submit" id="submitBtn">Notify Me</button>
                </div>
            </div>
        </form>

        <div class="message" id="message"></div>

        <div class="features">
            <div class="feature">
                <div class="feature-icon">📖</div>
                <div class="feature-title">Recipes</div>
                <div class="feature-text">Curated collection of delicious recipes</div>
            </div>
            <div class="feature">
                <div class="feature-icon">🎥</div>
                <div class="feature-title">Videos</div>
                <div class="feature-text">Step-by-step cooking tutorials</div>
            </div>
            <div class="feature">
                <div class="feature-icon">👨‍🍳</div>
                <div class="feature-title">Tips & Tricks</div>
                <div class="feature-text">Expert cooking advice</div>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('emailForm');
        const emailInput = document.getElementById('emailInput');
        const submitBtn = document.getElementById('submitBtn');
        const messageDiv = document.getElementById('message');

        // Store emails in localStorage for demonstration
        function saveEmail(email) {
            const emails = JSON.parse(localStorage.getItem('dwillcooks-emails') || '[]');
            if (!emails.includes(email)) {
                emails.push(email);
                localStorage.setItem('dwillcooks-emails', JSON.stringify(emails));
            }
        }

        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.className = `message ${type} show`;
            
            setTimeout(() => {
                messageDiv.classList.remove('show');
            }, 5000);
        }

        function validateEmail(email) {
            const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return re.test(email);
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = emailInput.value.trim();
            
            if (!validateEmail(email)) {
                showMessage('Please enter a valid email address.', 'error');
                return;
            }

            // Disable button during submission
            submitBtn.disabled = true;
            submitBtn.textContent = 'Submitting...';

            try {
                // Simulate API call with a delay
                await new Promise(resolve => setTimeout(resolve, 1000));
                
                // Save email to localStorage
                saveEmail(email);
                
                // Show success message
                showMessage('🎉 Thank you! We\'ll notify you when we launch!', 'success');
                
                // Clear the form
                emailInput.value = '';
                
            } catch (error) {
                showMessage('Something went wrong. Please try again.', 'error');
            } finally {
                // Re-enable button
                submitBtn.disabled = false;
                submitBtn.textContent = 'Notify Me';
            }
        });

        // Real-time email validation
        emailInput.addEventListener('input', () => {
            if (emailInput.value && !validateEmail(emailInput.value)) {
                emailInput.style.borderColor = '#fc8181';
            } else {
                emailInput.style.borderColor = '#e2e8f0';
            }
        });
    </script>
</body>
</html>
